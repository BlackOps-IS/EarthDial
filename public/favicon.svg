<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="BDPROJ animated favicon">
  <title>BDPROJ animated favicon</title>
  <style>
    :root {
      color-scheme: dark;
    }

    .diamond {
      fill: #07080a;
      stroke: #f2d47a;
      stroke-width: 3.2;
      stroke-linejoin: round;
      transform-origin: 32px 32px;
      animation: markPulse 5.6s ease-in-out infinite;
    }

    .facet {
      fill: none;
      stroke: #d4af37;
      stroke-width: 1.45;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: .42;
    }

    .monogram {
      fill: #f2d47a;
    }

    .shine {
      fill: #fff8cc;
      opacity: 0;
      animation: shineSweep 5.6s ease-in-out infinite;
    }

    @keyframes markPulse {
      0%, 100% { transform: translateY(0) scale(1); }
      46% { transform: translateY(-.7px) scale(1.018); }
    }

    @keyframes shineSweep {
      0%, 34% { opacity: 0; transform: translateX(-18px); }
      42% { opacity: .72; }
      52% { opacity: .9; }
      64%, 100% { opacity: 0; transform: translateX(18px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .diamond,
      .shine {
        animation: none;
      }
      .shine { opacity: .35; }
    }
  </style>
  <path class="diamond" d="M32 4 56 20.5 46.8 58H17.2L8 20.5 32 4Z"/>
  <path class="facet" d="M8 20.5h48M19.5 20.5 32 4l12.5 16.5M19.5 20.5 32 58l12.5-37.5"/>
  <path class="monogram" d="M22 16.2h11.2c6.5 0 10.3 3.2 10.3 8.1 0 3.1-1.5 5.3-4.3 6.4 3.6 1 5.8 3.8 5.8 7.6 0 5.7-4.4 9.5-11.3 9.5H22V16.2Zm6.5 5.9v6.4h4.2c2.7 0 4.2-1.2 4.2-3.2 0-2.1-1.5-3.2-4.3-3.2h-4.1Zm0 11.4v8.1h5.1c3.1 0 4.8-1.5 4.8-4.1 0-2.5-1.8-4-5-4h-4.9Z"/>
  <path class="shine" d="M16 22.5 32 11.5l16 11-4.1 3.3L32 18.6 20.1 25.8Z"/>
</svg>
